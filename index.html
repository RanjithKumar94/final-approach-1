<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATC Radar Simulator</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="container">


<!-- ========================= -->
<!-- Radar Screen -->
<!-- ========================= -->

<div id="radarContainer">

<canvas id="radar" width="900" height="900"></canvas>


<div id="clock">
03:00:00
</div>


</div>



<!-- ========================= -->
<!-- Control Panel -->
<!-- ========================= -->


<div id="controlPanel">


<h2>ATC Control Panel</h2>


<!-- Aircraft control -->

<label>Callsign</label><br>

<input 
id="callsign"
type="text"
placeholder="IGO201">


<br><br>


<label>Heading</label><br>

<input
id="heading"
type="number"
placeholder="270">


<br><br>


<label>Flight Level</label><br>

<input
id="level"
type="number"
placeholder="110">


<br><br>



<button id="applyBtn">
Apply Clearance
</button>


<br><br>



<label>Speed</label><br>

<input
id="speed"
type="number"
placeholder="220">


<button id="applySpeed">
Apply Speed
</button>


<br><br>



<!-- Turn controls -->

<button id="turnLeft">
TURN LEFT
</button>


<button id="turnRight">
TURN RIGHT
</button>


<button id="stopTurn">
STOP TURN
</button>


<br><br>



<!-- Simulation -->

<button id="pauseBtn">
PAUSE
</button>


<button id="resumeBtn">
RESUME
</button>



<hr>



<!-- ========================= -->
<!-- Departure Control -->
<!-- ========================= -->


<h3>Departure</h3>


<label>Callsign</label><br>

<input
id="depcallsign"
type="text"
placeholder="ETH201">


<br><br>


<label>Level</label><br>

<input
id="deplevel"
type="number"
placeholder="100">


<br><br>


<label>Departure Runway</label><br>


<select id="depRunway">


<option value="08">
RWY 08
</option>


<option value="26">
RWY 26
</option>


<option value="15">
RWY 15
</option>


<option value="33">
RWY 33
</option>


</select>


<br><br>


<button id="createDeparture">
CREATE DEPARTURE
</button>



</div>


</div>



<!-- ========================= -->
<!-- Scripts -->
<!-- ========================= -->


<script src="js/aircraft.js"></script>

<script src="js/radar.js"></script>

<script src="js/departure.js"></script>

<script src="js/main.js"></script>


</body>

</html>
